<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Salesman - City Choice Bakers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f6f6f6;
padding:20px;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}

.form-card {
background: #fff;
border-radius: 20px;
padding: 30px;
width: 100%;
max-width: 550px;
box-shadow: 0 4px 15px rgba(0,0,0,0.05);
border: 1px solid #eee;
}

.form-header {
text-align: center;
margin-bottom: 25px;
border-bottom: 2px solid #ff2b2b;
padding-bottom: 15px;
}

.form-header h2 {
color: #111;
font-size: 22px;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.form-header p {
font-size: 13px;
color: #666;
margin-top: 5px;
}

.form-group {
margin-bottom: 18px;
}

.form-group label {
display: block;
font-size: 12px;
font-weight: 600;
text-transform: uppercase;
color: #333;
margin-bottom: 6px;
}

.input-wrapper {
position: relative;
display: flex;
align-items: center;
}

.input-wrapper i {
position: absolute;
left: 12px;
color: #ff2b2b;
font-size: 14px;
}

.form-control {
width: 100%;
padding: 12px 12px 12px 40px;
border: 1px solid #ddd;
border-radius: 10px;
font-size: 14px;
color: #222;
outline: none;
transition: 0.2s;
}

.form-control:focus {
border-color: #ff2b2b;
box-shadow: 0 0 5px rgba(255, 43, 43, 0.1);
}

select.form-control {
padding-left: 40px;
cursor: pointer;
}

/* PHOTO PREVIEW STYLING */
.photo-preview-container {
display: flex;
align-items: center;
gap: 15px;
background: #f9f9f9;
padding: 10px;
border-radius: 12px;
border: 1px dashed #ddd;
}

#preview-img {
width: 55px;
height: 55px;
border-radius: 50%;
object-fit: cover;
background: #eee;
border: 2px solid #ff2b2b;
}

/* SUBMIT BUTTON */
.submit-btn {
width: 100%;
background: linear-gradient(135deg,#ff2b2b,#111);
color: #fff;
border: none;
padding: 14px;
border-radius: 12px;
font-size: 15px;
font-weight: 600;
cursor: pointer;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
transition: 0.2s;
text-transform: uppercase;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.submit-btn:hover {
opacity: 0.95;
transform: translateY(-1px);
}

.submit-btn:disabled {
background: #ccc;
cursor: not-allowed;
}

.back-link {
display: block;
text-align: center;
margin-top: 15px;
font-size: 13px;
color: #666;
text-decoration: none;
font-weight: 600;
}
.back-link:hover {
color: #ff2b2b;
}
</style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <h2><i class="fa-solid fa-user-plus"></i> Add New Salesman</h2>
        <p>Register professional field personnel to branch directory</p>
    </div>

    <form id="salesmanForm" onsubmit="saveSalesmanToSupabase(event)">
        
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="name" class="form-control" placeholder="Enter full name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="example@citychoice.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="phone" class="form-control" placeholder="Enter contact number" required>
            </div>
        </div>

        <div class="form-group">
            <label>Login Username</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" id="username" class="form-control" placeholder="Create login username" required>
            </div>
        </div>

        <div class="form-group">
            <label>Login Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="Create secure password" required>
            </div>
        </div>

        <div class="form-group">
            <label>Assign Shop / Branch</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-shop"></i>
                <select id="shop_name" class="form-control" required>
                    <option value="" disabled selected>Select assigned location</option>
                    <option value="City Choice Bakers - Magam">Gulmarg Road Magam</option>
                    <option value="City Choice Bakers - Kunzer">Main Market Kunzer</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Initial Status</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-toggle-on"></i>
                <select id="status" class="form-control" required>
                    <option value="Active" selected>Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Profile Photo URL</label>
            <div class="input-wrapper" style="margin-bottom: 8px;">
                <i class="fa-solid fa-image"></i>
                <input type="url" id="photo" class="form-control" placeholder="Paste image link (or leave default)" oninput="updatePhotoPreview(this.value)">
            </div>
            <div class="photo-preview-container">
                <img id="preview-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile Preview">
                <span style="font-size:11px; color:#666;">Live image preview canvas hook.</span>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">
            <i class="fa-solid fa-circle-check"></i> Provision Salesman Profile
        </button>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Return to Control Panel</a>
    </form>
</div>

<script>
const SUPABASE_URL = "https://ftuchilcswtnnldrugir.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU";           

let db;

try {
    if (typeof supabase !== 'undefined') {
        db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } else {
        alert("Database framework injection failed on this document structure!");
    }
} catch(err) {
    console.error("Supabase link instantiation broken:", err.message);
}

function updatePhotoPreview(url) {
    const preview = document.getElementById("preview-img");
    if(url.trim() !== "") {
        preview.src = url;
    } else {
        preview.src = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    }
}

async function saveSalesmanToSupabase(event) {
    event.preventDefault(); 

    if(!db) {
        alert("Action Aborted: Supabase Database system is not connected.");
        return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Writing Records...`;

    const rawPhotoUrl = document.getElementById("photo").value.trim();
    const defaultPhoto = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    // Strictly mapping fields to your specific table columns
    const dataPayload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(), 
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
        shop_name: document.getElementById("shop_name").value,
        status: document.getElementById("status").value,
        photo: rawPhotoUrl === "" ? defaultPhoto : rawPhotoUrl
    };

    try {
        // TARGET RE-MAPPED TO 'salesmen' TABLE
        const { error } = await db.from("salesmen").insert([dataPayload]);

        if (error) throw error;

        alert("Success! Salesman added successfully to City Choice Bakers database system.");
        
        document.getElementById("salesmanForm").reset();
        updatePhotoPreview("");

    } catch (err) {
        alert("Database Insertion Refused:\n" + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> Provision Salesman Profile`;
    }
}
</script>
</body>
</html>
