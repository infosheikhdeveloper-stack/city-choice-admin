<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - City Choice Bakers</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Poppins;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#38bdf8);
}

/* LOGIN BOX */
.box{
width:350px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.4);
color:white;
text-align:center;
}

/* LOGO */
.logo{
font-size:28px;
font-weight:900;
margin-bottom:10px;
}

.tag{
font-size:12px;
opacity:0.8;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-weight:800;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

/* ERROR */
#error{
color:#ff4d4d;
font-size:13px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">
<i class="fa fa-cake-candles"></i>
City Choice Bakers
</div>

<div class="tag">
Admin Panel Login
</div>

<input type="email" id="email" placeholder="Admin Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="error"></div>

</div>

<script>

const sb = window.supabase.createClient(
"https://ftuchilcswtnnldrugir.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU"
);

async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

document.getElementById("error").innerText = "";

const { data, error } = await sb.auth.signInWithPassword({
email,
password
});

if(error){
document.getElementById("error").innerText = error.message;
return;
}

// CHECK ADMIN ROLE
const user = data.user;

const { data: profile } = await sb
.from("profiles")
.select("role")
.eq("id", user.id)
.single();

if(!profile || profile.role !== "admin"){
await sb.auth.signOut();
document.getElementById("error").innerText = "Access Denied! Admin only.";
return;
}

// SAVE LOGIN
localStorage.setItem("admin", "true");

// REDIRECT
window.location.href = "dashboard.html";

}

</script>

</body>
</html>
