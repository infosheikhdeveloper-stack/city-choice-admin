<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Products - Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <link rel="stylesheet" href="back.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:#f1f5f9;
padding:20px;
}

/* TOP BAR */
h1{
text-align:center;
margin-bottom:20px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* IMAGE */
.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

/* TEXT */
.title{
font-size:18px;
font-weight:800;
margin-top:10px;
}

.desc{
font-size:13px;
color:#555;
margin:5px 0;
}

.price{
font-weight:900;
color:green;
margin:5px 0;
}

.cat{
font-size:12px;
background:#e2e8f0;
display:inline-block;
padding:4px 10px;
border-radius:20px;
}

/* BUTTONS */
.btns{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.edit{
background:#3b82f6;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

</style>

</head>

<body>

<h1>All Products</h1>

<div class="container" id="productsBox">
Loading...
</div>

<script>

const sb = window.supabase.createClient(
"https://ftuchilcswtnnldrugir.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU"
);

// LOAD PRODUCTS
async function loadProducts(){

const { data, error } = await sb
.from("products")
.select("*")
.order("id", { ascending:false });

if(error){
document.getElementById("productsBox").innerHTML =
error.message;
return;
}

let html = "";

data.forEach(p => {

html += `
<div class="card">

<img src="${p.image}">

<div class="title">${p.title}</div>

<div class="desc">${p.description}</div>

<div class="price">₹${p.price}</div>

<div class="cat">${p.category}</div>

<div class="btns">

<button class="edit" onclick="editProduct('${p.id}')">
<i class="fa fa-edit"></i> Edit
</button>

<button class="delete" onclick="deleteProduct('${p.id}')">
<i class="fa fa-trash"></i> Delete
</button>

</div>

</div>
`;
});

document.getElementById("productsBox").innerHTML = html;

}

// DELETE PRODUCT
async function deleteProduct(id){

let confirmDelete = confirm("Delete this product?");

if(!confirmDelete) return;

const { error } = await sb
.from("products")
.delete()
.eq("id", id);

if(error){
alert("Delete Error: " + error.message);
return;
}

alert("Product Deleted!");
loadProducts();
}

// EDIT (placeholder)
function editProduct(id){
alert("Edit feature coming soon!\nProduct ID: " + id);
}

loadProducts();

</script>
<script src="back.js"></script>
</body>
</html>
