<script>

const sb = window.supabase.createClient(
"https://ftuchilcswtnnldrugir.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU"
);

async function loadProductsCount(){

const { count, error } = await sb
.from("products")
.select("*", { count: "exact", head: true });

if(error){
console.log("Products Count Error:", error.message);
document.getElementById("productsCount").innerText = "0";
return;
}

document.getElementById("productsCount").innerText = count || 0;

}

loadProductsCount();


// COUNTS
async function loadData(){

const { count: users } = await sb.from("users").select("*",{count:"exact", head:true});
const { count: orders } = await sb.from("orders").select("*",{count:"exact", head:true});

const { count: pending } = await sb.from("orders").select("*",{count:"exact", head:true}).eq("status","Pending");
const { count: waiting } = await sb.from("orders").select("*",{count:"exact", head:true}).eq("status","Waiting");
const { count: cancelled } = await sb.from("orders").select("*",{count:"exact", head:true}).eq("status","Cancelled");
const { count: employees } = await sb.from("employees").select("*",{count:"exact", head:true});
const { count: accepted } = await sb.from("orders").select("*",{count:"exact", head:true}).eq("status","Accepted");

document.getElementById("acceptedCount").innerText = accepted || 0;
document.getElementById("usersCount").innerText = users || 0;
document.getElementById("ordersCount").innerText = orders || 0;
document.getElementById("pendingCount").innerText = pending || 0;
document.getElementById("waitingCount").innerText = waiting || 0;
document.getElementById("cancelCount").innerText = cancelled || 0;
document.getElementById("empCount").innerText = employees || 0;

// CHART
// STATUS CHART (SMALL DOUGHNUT)
new Chart(document.getElementById("statusChart"), {
type: 'doughnut',
data: {
labels: ['Pending','Waiting','Cancelled'],
datasets: [{
data: [pending, waiting, cancelled],
backgroundColor: ['#f59e0b','#3b82f6','#ef4444']
}]
},
options: {
responsive: true,
maintainAspectRatio: false
}
});


// TOTAL ORDERS CIRCLE (SMALL CENTER LOGO STYLE)
new Chart(document.getElementById("orderChart"), {
type: 'doughnut',
data: {
labels: ['Orders'],
datasets: [{
data: [orders],
backgroundColor: ['#22c55e']
}]
},
options: {
responsive: true,
maintainAspectRatio: false,
cutout: "75%"
}
});


}

loadData();

</script>
<script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.getElementById("installBtn");
    if(btn) btn.style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    const { outcome } = await deferredPrompt.userChoice;

    if(outcome === "accepted"){
        console.log("PWA Installed");
    }

    deferredPrompt = null;
    document.getElementById("installBtn").style.display = "none";
});

window.addEventListener("appinstalled", () => {
    document.getElementById("installBtn").style.display = "none";
    console.log("App Installed Successfully");
});

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js")
    .then(() => console.log("SW Registered"))
    .catch(err => console.log(err));
}
</script>
