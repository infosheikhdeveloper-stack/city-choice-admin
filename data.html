<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Filtered Orders</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <link rel="stylesheet" href="back.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Poppins;
background:#f1f5f9;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* STATUS */
.status{
font-weight:800;
margin-bottom:10px;
}

.pending{color:#f59e0b;}
.waiting{color:#3b82f6;}
.cancelled{color:#ef4444;}

.item{
font-size:14px;
margin:5px 0;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#111827;
color:white;
border-radius:10px;
text-decoration:none;
font-size:12px;
}
</style>

</head>

<body>

<h1 id="title">Orders</h1>

<div class="container" id="box">
Loading...
</div>

<script>

const sb = window.supabase.createClient(
"https://ftuchilcswtnnldrugir.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU"
);

const type = new URLSearchParams(window.location.search).get("type");

document.getElementById("title").innerText = type + " Orders";

async function load(){

let query = sb.from("orders").select("*").order("id",{ascending:false});

// FILTER LOGIC
if(type){
query = query.eq("status", type);
}

const { data, error } = await query;

if(error){
document.getElementById("box").innerHTML = error.message;
return;
}

if(!data.length){
document.getElementById("box").innerHTML = "No orders found";
return;
}

let html = "";

data.forEach(o => {

html += `
<div class="card">

<div class="status ${o.status.toLowerCase()}">
${o.status}
</div>

<div class="item"><b>Name:</b> ${o.customer_name}</div>
<div class="item"><b>Phone:</b> ${o.phone}</div>
<div class="item"><b>Total:</b> ₹${o.grand_total}</div>

<a class="btn" href="vieworder.html?id=${o.order_id}">
View Details
</a>

</div>
`;
});

document.getElementById("box").innerHTML = html;

}

load();

</script>
<script src="back.js"></script>
</body>
</html>
